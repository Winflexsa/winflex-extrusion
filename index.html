<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Winflex Extrusión — Lanús</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --green:#16a34a;--green-d:#15803d;--green-l:#f0fdf4;
    --txt:#1f2937;--muted:#6b7280;--border:#e5e7eb;--bg:#f9fafb;--surface:#fff;--surface2:#f3f4f6;
    --red:#dc2626;--red-l:#fef2f2;--amber:#d97706;--amber-l:#fffbeb;--blue:#2563eb;--blue-l:#eff6ff;--violet:#7c3aed;
  }
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:var(--txt);background:var(--bg);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
  .hidden{display:none!important}
  button{font-family:inherit;cursor:pointer;border:none;font-size:14px}
  input,select,textarea{font-family:inherit;font-size:14px;padding:9px 11px;border:1px solid var(--border);border-radius:7px;width:100%;background:#fff;color:var(--txt)}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--green)}
  label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:4px}
  .btn{background:var(--green);color:#fff;padding:9px 16px;border-radius:7px;font-weight:600;display:inline-flex;align-items:center;gap:6px}
  .btn:hover{background:var(--green-d)}
  .btn-ghost{background:var(--surface2);color:var(--txt);padding:8px 14px;border-radius:7px;font-weight:600}
  .btn-ghost:hover{background:var(--border)}
  .btn-sm{padding:5px 10px;font-size:12px;border-radius:6px}
  .btn-danger{background:var(--red-l);color:var(--red);font-weight:600;padding:8px 14px;border-radius:7px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:14px}
  .pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:700}
  .row{display:flex;gap:12px;flex-wrap:wrap}
  .grid{display:grid;gap:12px}
  .muted{color:var(--muted)}
  h2{font-size:20px;font-weight:700;margin-bottom:4px}
  h3{font-size:15px;font-weight:700;margin-bottom:10px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;color:var(--muted);font-weight:600;padding:8px 10px;border-bottom:1px solid var(--border);font-size:11px;text-transform:uppercase;letter-spacing:.03em}
  td{padding:9px 10px;border-bottom:1px solid var(--border)}
  tr:hover td{background:var(--bg)}

  /* LOGIN */
  #login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(160deg,#f0fdf4,#fff)}
  .login-box{background:#fff;border:1px solid var(--border);border-radius:18px;padding:34px;width:100%;max-width:360px;text-align:center;box-shadow:0 8px 30px rgba(0,0,0,.06)}
  .logo{display:inline-flex;align-items:center;gap:9px;font-weight:800;font-size:22px;color:var(--green-d);margin-bottom:6px}
  .logo-mark{width:34px;height:34px;background:var(--green);border-radius:9px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:18px}
  .login-logo{height:90px;width:auto;display:block;margin:2px auto 12px}
  .hdr-logo{height:26px;width:auto;display:block}
  .pin-input{text-align:center;letter-spacing:8px;font-size:24px;font-weight:700;margin:18px 0}

  /* HEADER */
  header{background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:30}
  .hbar{max-width:1080px;margin:0 auto;padding:11px 18px;display:flex;align-items:center;gap:14px}
  .sync{font-size:12px;font-weight:600;padding:4px 10px;border-radius:999px;background:var(--surface2);color:var(--muted);display:flex;align-items:center;gap:6px}
  .sync .dot{width:8px;height:8px;border-radius:50%;background:var(--muted)}
  .sync.ok .dot{background:var(--green)} .sync.ok{color:var(--green-d);background:var(--green-l)}
  .sync.error .dot{background:var(--red)} .sync.error{color:var(--red);background:var(--red-l)}
  .sync.syncing .dot{background:var(--amber)} .sync.syncing{color:var(--amber);background:var(--amber-l)}
  nav{max-width:1080px;margin:0 auto;padding:0 18px;display:flex;gap:4px;overflow-x:auto}
  nav button{padding:11px 14px;background:none;color:var(--muted);font-weight:600;border-bottom:2px solid transparent;white-space:nowrap;font-size:14px}
  nav button.active{color:var(--green-d);border-bottom-color:var(--green)}
  main{max-width:1080px;margin:0 auto;padding:20px 18px 60px}

  .stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px}
  .stat .n{font-size:28px;font-weight:800;line-height:1.1}
  .stat .l{font-size:12px;color:var(--muted);font-weight:600;margin-top:2px}
  .machine-chip{display:inline-flex;align-items:center;gap:7px;font-weight:700;font-size:13px}
  .machine-dot{width:11px;height:11px;border-radius:3px}

  /* MODAL */
  .modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:50;display:flex;align-items:flex-start;justify-content:center;padding:24px;overflow-y:auto}
  .modal{background:#fff;border-radius:16px;width:100%;max-width:560px;padding:24px;margin:auto}
  .modal h3{font-size:18px}
  .field{margin-bottom:12px}
  .field2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

  /* TABLET */
  #tablet{min-height:100vh;background:#0f172a;color:#fff;padding:18px}
  .tab-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
  .tab-head .logo{color:#fff}
  .sess-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:760px;margin:0 auto}
  .sess-card{border-radius:18px;padding:0;overflow:hidden;background:#1e293b;cursor:pointer;border:2px solid transparent}
  .sess-card:active{transform:scale(.99)}
  .sess-band{height:10px}
  .sess-body{padding:20px}
  .sess-body .mq{font-size:22px;font-weight:800}
  .sess-body .op{font-size:13px;color:#94a3b8;margin-top:4px}
  .sess-empty{grid-column:1/-1;text-align:center;color:#64748b;padding:50px 20px;background:#1e293b;border-radius:18px}
  .tablet-session{max-width:680px;margin:0 auto}
  .ts-band{border-radius:16px 16px 0 0;padding:22px 22px 18px;color:#fff}
  .ts-body{background:#1e293b;border-radius:0 0 16px 16px;padding:22px}
  .ts-body input,.ts-body select{background:#0f172a;border-color:#334155;color:#fff}
  .bobina-row{display:flex;justify-content:space-between;padding:10px 12px;background:#0f172a;border-radius:8px;margin-bottom:7px;font-size:14px}
  .big-btn{width:100%;padding:18px;font-size:18px;font-weight:800;border-radius:14px;background:#fff;color:#0f172a;margin-top:6px}
  #toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#1f2937;color:#fff;padding:12px 20px;border-radius:10px;font-size:14px;font-weight:600;z-index:99;opacity:0;transition:opacity .25s;pointer-events:none}
  #toast.show{opacity:1}
  #toast.error{background:var(--red)}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="login">
  <div class="login-box">
    <img id="loginLogo" class="login-logo" alt="Winflex S.A.">
    <div class="muted" style="font-size:13px;margin-bottom:6px">Extrusión · Lanús</div>
    <input id="pinInput" class="pin-input" type="password" inputmode="numeric" maxlength="6" placeholder="••••" autocomplete="off">
    <button class="btn" style="width:100%;justify-content:center" onclick="doLogin()">Entrar</button>
    <div id="loginErr" style="color:var(--red);font-size:13px;margin-top:10px;min-height:18px"></div>
  </div>
</div>

<!-- ============ PORTAL ============ -->
<div id="app" class="hidden">
  <header>
    <div class="hbar">
      <div class="logo" style="gap:8px"><img id="hdrLogo" class="hdr-logo" alt="Winflex"><span style="color:var(--muted);font-weight:600;font-size:14px">Extrusión</span></div>
      <div style="flex:1"></div>
      <div id="syncStatus" class="sync"><span class="dot"></span><span class="t">Local</span></div>
      <button class="btn-ghost btn-sm" onclick="enterTablet()">📱 Tablet</button>
      <button class="btn-ghost btn-sm" onclick="logout()">Salir</button>
    </div>
    <nav id="nav"></nav>
  </header>
  <main id="view"></main>
</div>

<!-- ============ TABLET ============ -->
<div id="tablet" class="hidden"></div>

<div id="modalRoot"></div>
<div id="toast"></div>

function getGistCreds(){ try{ return JSON.parse(localStorage.getItem(GIST_LS)); }catch(e){ return null; } }
function setGistCreds(gistId,token){ localStorage.setItem(GIST_LS,JSON.stringify({gistId,token})); }
function clearGistCreds(){ localStorage.removeItem(GIST_LS); }

function setSync(txt,cls){ const el=$('syncStatus'); if(!el) return; el.className='sync '+(cls||''); el.querySelector('.t').textContent=txt; }

// Une dos arrays de objetos {id, updatedAt|timestamp}: gana el más nuevo, sin perder ninguno.
function mergeById(remoteArr, localArr){
  const m=new Map();
  (remoteArr||[]).forEach(x=>{ if(x&&x.id) m.set(x.id,x); });
  (localArr||[]).forEach(x=>{
    if(!x||!x.id) return;
    const r=m.get(x.id);
    if(!r){ m.set(x.id,x); return; }
    const tl=x.updatedAt||x.timestamp||'', tr=r.updatedAt||r.timestamp||'';
    m.set(x.id, tl>=tr ? x : r);
  });
  return [...m.values()];
}
function mergeTombstones(a,b){
  const out={};
  [a,b].forEach(o=>{ if(o&&typeof o==='object') Object.entries(o).forEach(([id,ts])=>{ if(!out[id]||ts>out[id]) out[id]=ts; }); });
  const lim=new Date(Date.now()-120*864e5).toISOString();
  Object.keys(out).forEach(id=>{ if(out[id]<lim) delete out[id]; });
  return out;
}
function aplicarTombstones(arr,tomb){
  if(!tomb) return arr||[];
  return (arr||[]).filter(o=>{ const ts=tomb[o.id]; return !ts || (o.updatedAt||'')>ts; });
}

async function loadData(){
  setSync('Cargando…','syncing');
  const cached=localStorage.getItem(LS_KEY);
  const creds=getGistCreds();
  if(creds){
    try{
      const r=await fetch('https://api.github.com/gists/'+creds.gistId,{headers:{'Authorization':'token '+creds.token,'Accept':'application/vnd.github+json'}});
      if(r.ok){
        const j=await r.json(); const f=j.files&&j.files[GIST_FILE];
        if(f&&f.content){
          DATA=migrate(JSON.parse(f.content));
          localStorage.setItem(LS_KEY,JSON.stringify(DATA));
          setSync('Sincronizado (Gist)','ok'); return DATA;
        }
        // Gist existe pero sin nuestro archivo todavía → sembrar
        DATA=seedData(); localStorage.setItem(LS_KEY,JSON.stringify(DATA));
        setSync('Gist vacío · listo','ok'); return DATA;
      } else { setSync('Gist '+r.status,'error'); }
    }catch(e){ setSync('Gist offline','error'); }
  }
  if(cached){ try{ DATA=migrate(JSON.parse(cached)); setSync(creds?'Offline (cache)':'Local','error'); return DATA; }catch(e){ localStorage.removeItem(LS_KEY); } }
  DATA=seedData(); localStorage.setItem(LS_KEY,JSON.stringify(DATA)); setSync('Local','');
  return DATA;
}

async function saveData(){
  DATA.lastUpdate=nowISO();
  localStorage.setItem(LS_KEY,JSON.stringify(DATA));
  const creds=getGistCreds();
  if(!creds){ setSync('Local (sin Gist)',''); return; }
  setSync('Guardando…','syncing');
  try{
    // GET fresco para mergear con lo que cargó la tablet u otro equipo
    const fr=await fetch('https://api.github.com/gists/'+creds.gistId,{headers:{'Authorization':'token '+creds.token,'Accept':'application/vnd.github+json'}});
    let remote={};
    if(fr.ok){ const fj=await fr.json(); const f=fj.files&&fj.files[GIST_FILE]; if(f&&f.content) remote=JSON.parse(f.content); }
    const merged=JSON.parse(JSON.stringify(DATA)); // catálogos + config del LOCAL
    merged.ordenesEliminadas=mergeTombstones(remote.ordenesEliminadas,DATA.ordenesEliminadas);
    merged.ordenes=aplicarTombstones(mergeById(remote.ordenes,DATA.ordenes),merged.ordenesEliminadas);
    merged.producciones=mergeById(remote.producciones,DATA.producciones);
    merged.ocsEliminadas=mergeTombstones(remote.ocsEliminadas,DATA.ocsEliminadas);
    merged.ocs=aplicarTombstones(mergeById(remote.ocs,DATA.ocs),merged.ocsEliminadas); // tablet + portal sin pisar
    merged.lastUpdate=nowISO();
    const content=JSON.stringify(merged);
    const r=await fetch('https://api.github.com/gists/'+creds.gistId,{
      method:'PATCH',
      headers:{'Authorization':'token '+creds.token,'Accept':'application/vnd.github+json','Content-Type':'application/json'},
      body:JSON.stringify({files:{[GIST_FILE]:{content}}})
    });
    if(r.ok){ DATA=merged; localStorage.setItem(LS_KEY,JSON.stringify(DATA)); setSync('Sincronizado (Gist)','ok'); }
    else { setSync('Error '+r.status+' · NO subido','error'); toast('No se pudo guardar en la nube (HTTP '+r.status+')','error'); }
  }catch(e){ setSync('Sin conexión · NO subido','error'); toast('Sin conexión con la nube','error'); }
}

function migrate(d){
  const s=seedData();
  d.schemaVersion=d.schemaVersion||1;
  d.config=Object.assign({},s.config,d.config||{});
  ['maquinas','materiasPrimas','formatos','productos','tiposProducto','recetasLaminado','clientes','ordenes','ocs','producciones'].forEach(k=>{ if(!Array.isArray(d[k])) d[k]=s[k]; });
  if(!d.ordenesEliminadas) d.ordenesEliminadas={};
  if(!d.ocsEliminadas) d.ocsEliminadas={};
  if(!d.maquinas.length) d.maquinas=s.maquinas;
  if(!d.formatos.length) d.formatos=s.formatos;
  if(!d.recetasLaminado.length) d.recetasLaminado=s.recetasLaminado;
  if(!d.clientes.length) d.clientes=s.clientes;
  return d;
}

async function createGist(token){
  const body={ description:'Winflex — Extrusión Lanús (datos)', public:false, files:{[GIST_FILE]:{content:JSON.stringify(DATA||seedData())}} };
  const r=await fetch('https://api.github.com/gists',{method:'POST',headers:{'Authorization':'token '+token,'Accept':'application/vnd.github+json','Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok) throw new Error('HTTP '+r.status);
  const j=await r.json(); return j.id;
}

function calcLaminado(r,kg){
  const dPet=DATA.config.densPET||1.38, dPe=DATA.config.densPE||0.92;
  const gxmPet=(r.anchoFinal/10)*(r.petEspLam*1e-4)*dPet*100;
  const gxmPe=(r.anchoFinal/10)*(r.peEspLam*1e-4)*dPe*100;
  const gxmTot=gxmPet+gxmPe;
  const metros=gxmTot>0?(kg*1000)/gxmTot:0;
  const kgPet=gxmPet*metros/1000, kgPe=gxmPe*metros/1000;
  let mbob=null,nbob=null,pesoBobPet=null,pesoBobPe=null;
  if(r.pesoBobina&&gxmTot>0){ mbob=r.pesoBobina*1000/gxmTot; nbob=Math.ceil(metros/mbob);
    if(r.petAncho&&r.petEsp){ const g=(r.petAncho/10)*(r.petEsp*1e-4)*dPet*100; pesoBobPet=g*mbob/1000; }
    if(r.peAncho&&r.peEsp){ const g=(r.peAncho/10)*(r.peEsp*1e-4)*dPe*100; pesoBobPe=g*mbob/1000; }
  }
  return {gxmPet,gxmPe,gxmTot,metros,kgPet,kgPe,mbob,nbob,pesoBobPet,pesoBobPe};
}

function recalcOCLam(){

    <div class="grid" style="grid-template-columns:1fr 1fr;gap:8px 16px;font-size:13px">

      <div><span class="muted">Peso bob. PET:</span> <b>${c.pesoBobPet?c.pesoBobPet.toFixed(1):'—'} kg</b></div>

}
async function guardarOC(id){
  const modo=document.getElementById('oc_modo').value;
  const base={ numero:document.getElementById('oc_num').value.trim()||nextOCNumero(), fecha:document.getElementById('oc_fecha').value, notas:document.getElementById('oc_notas').value.trim(), modo, updatedAt:nowISO() };
  let obj;
  if(modo==='laminado'){
    const r=DATA.recetasLaminado.find(x=>x.id===document.getElementById('oc_receta').value);
    const kg=+document.getElementById('oc_kgped').value||0;
    obj=Object.assign(base,{ recetaId:r?r.id:null, cliente:r?r.cliente:'', maquinaId:'maq-1', kgPedido:kg, kgTotal:kg, calc:r?calcLaminado(r,kg):null });
  } else {
    const std=DATA.config.pesoBobinaStd||20;
    const items=_ocItems.filter(it=>it.tipoProductoId&&((+it.ancho)||(+it.cantidadBobinas))).map(it=>{ const tp=DATA.tiposProducto.find(t=>t.id===it.tipoProductoId); const bob=+it.cantidadBobinas||0, peso=+it.pesoPorBobina||std; return { cliente:(modo==='interno'?'':(it.cliente||'').trim()), tipoProductoId:it.tipoProductoId, maquinaId:tp?tp.maquinaId:null, ancho:+it.ancho||null, espesor:+it.espesor||null, cantidadBobinas:bob, pesoPorBobina:peso, kgTotal:bob*peso, ordenId:it.ordenId||null }; });
    const kgTotal=items.reduce((s,it)=>s+(it.kgTotal||0),0);
    let cliente='';
    if(modo==='clientes'&&items.length){ cliente = items.every(x=>x.cliente===items[0].cliente)? items[0].cliente : ''; }
    obj=Object.assign(base,{ items, kgTotal, cliente });
  }
  if(id){ Object.assign(DATA.ocs.find(o=>o.id===id),obj); }
  else { Object.assign(obj,{ id:uid('oc'), estado:'Pendiente', creadoPor:currentUser, createdAt:nowISO() }); DATA.ocs.push(obj); }
  closeModal(); render(); await saveData(); toast('OC guardada');
}
async function borrarOC(id){ if(!confirm('¿Eliminar esta OC?'))return; DATA.ocs=DATA.ocs.filter(o=>o.id!==id); DATA.ocsEliminadas[id]=nowISO(); closeModal(); render(); await saveData(); toast('OC eliminada'); }
async function generarOP(ocId){
  const oc=DATA.ocs.find(o=>o.id===ocId); if(!oc)return;
  if(oc.modo==='laminado'){
    if(oc.ordenId){ toast('Esta OC ya tiene OP'); return; }
    const r=DATA.recetasLaminado.find(x=>x.id===oc.recetaId);
    const c=oc.calc||(r?calcLaminado(r,oc.kgPedido||0):null);
    const orden={ id:uid('op'), numero:nextOPNumero(), ot:nextOT('maq-1'), origen:'laminado', cliente:oc.cliente||'', oc:oc.numero||'', maquinaId:'maq-1', formato:'Bobina lámina',
      productoDesc:`PE ${r?(r.peAncho||''):''}×${r?(r.peEsp||''):''} (lam. ${r?r.cliente:''})`.trim(),
      ancho:r?r.peAncho:null, espesor:r?r.peEsp:null, cantidadBobinas:c?c.nbob:null, cantidadObjetivo:c?Math.round(c.kgPe):(oc.kgPedido||0), unidad:'kg',
      destino:'Laminación', tipoProducto:'proceso', demandaPet:c?Math.round(c.kgPet):null,
      estadoProduccion:'Programada', estadoDestino:'Pendiente', ocId:oc.id, creadoPor:currentUser, createdAt:nowISO(), updatedAt:nowISO() };
    DATA.ordenes.push(orden); oc.estado='En OP'; oc.ordenId=orden.id; oc.updatedAt=nowISO();
    await saveData(); toast('OP '+orden.numero+' generada desde '+oc.numero); currentTab='ordenes'; render(); return;
  }
  let made=0;
  (oc.items||[]).forEach(it=>{
    if(it.ordenId) return;
    const tp=DATA.tiposProducto.find(t=>t.id===it.tipoProductoId);
    const dest= oc.modo==='interno'?'Uso interno':((tp&&tp.destinoDefault)||'Venta directa');
    const origen= oc.modo==='interno'?'interno':(dest==='Laminación'?'laminado':'venta');
    const orden={ id:uid('op'), numero:nextOPNumero(), ot:nextOT(it.maquinaId), origen, cliente:it.cliente||'', oc:oc.numero||'', maquinaId:it.maquinaId, formato:'Bobina lámina', productoDesc:`${tp?tp.nombre:''} ${it.ancho||''}×${it.espesor||''}`.trim(), ancho:it.ancho, espesor:it.espesor, cantidadBobinas:it.cantidadBobinas, cantidadObjetivo:it.kgTotal, unidad:'kg', destino:dest, tipoProducto:DESTINOS[dest]?DESTINOS[dest].tipo:'final', estadoProduccion:'Programada', estadoDestino:'Pendiente', ocId:oc.id, creadoPor:currentUser, createdAt:nowISO(), updatedAt:nowISO() };
    DATA.ordenes.push(orden); it.ordenId=orden.id; made++;
  });
  if(!made){ toast('Todas las medidas ya tienen OP'); return; }
  oc.estado='En OP'; oc.updatedAt=nowISO();
  await saveData(); toast(made+' OP'+(made>1?'s':'')+' generada'+(made>1?'s':'')+' desde '+oc.numero); currentTab='ordenes'; render();
}

function loadScript(src){ return new Promise((res,rej)=>{ if([...document.scripts].some(s=>s.src===src)) return res(); const s=document.createElement('script'); s.src=src; s.onload=()=>res(); s.onerror=()=>rej(new Error('No se pudo cargar '+src)); document.head.appendChild(s); }); }
async function ensureJsPDF(){
  if(!window.jspdf) await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js');
  if(!(window.jspdf&&window.jspdf.jsPDF.API&&window.jspdf.jsPDF.API.autoTable)) await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js');
  return window.jspdf.jsPDF;
}

function nextOPNumero(){
  const n=DATA.ordenes.length+1;
  return 'OP-'+String(n).padStart(4,'0');
}
function calcOP(p){
  const k1=p.k1||1;
  const gxm=(p.densidad&&p.ancho&&p.espesor)?(p.densidad*p.ancho*p.espesor*k1/1000):0;
  let metros=p.metros||0;
  if(!metros && p.kgObj && gxm) metros=p.kgObj*1000/gxm;
  const pesoSC=(gxm&&p.longitud)?gxm*p.longitud/1000:0;
  const cono=p.pesoCono||0; const pesoCC=pesoSC+cono;
  let nbob=(metros&&p.longitud)?Math.ceil(metros/p.longitud):0; if(p.bobinaPar&&nbob%2)nbob++;
  const kgTotal=pesoSC*nbob;
  const dur=(p.kgHora&&kgTotal)?kgTotal/p.kgHora:0;
  return {gxm,pesoSC,pesoCC,metros,nbob,kgTotal,dur};
}
function calcOPlive(){
  const box=$('c_res'); if(!box) return;
  const maq=maqById($('o_maq').value);
  const c=calcOP({ densidad:+$('c_dens').value||0, ancho:+$('c_ancho').value||0, espesor:+$('c_esp').value||0, k1:+$('c_k1').value||1, longitud:+$('c_long').value||0, pesoCono:+$('c_cono').value||0, metros:+$('c_metros').value||0, kgObj:+$('o_cant').value||0, bobinaPar:$('c_par').checked, kgHora:maq?maq.kgHora:null });
  const f=(n,d=2)=>n?n.toLocaleString('es-AR',{minimumFractionDigits:d,maximumFractionDigits:d}):'—';
  box.innerHTML=`<div class="grid" style="grid-template-columns:1fr 1fr;gap:6px 16px">
    <div><span class="muted">grs/mts:</span> <b>${f(c.gxm,2)}</b></div>
    <div><span class="muted">Metros:</span> <b>${c.metros?Math.round(c.metros).toLocaleString('es-AR'):'—'}</b></div>
    <div><span class="muted">Peso bob. s/cono:</span> <b>${f(c.pesoSC,2)} kg</b></div>
    <div><span class="muted">Peso bob. c/cono:</span> <b>${f(c.pesoCC,2)} kg</b></div>
    <div><span class="muted">Cant. bobinas:</span> <b>${c.nbob||'—'}</b></div>
    <div><span class="muted">Kg total:</span> <b style="color:var(--green-d)">${c.kgTotal?Math.round(c.kgTotal).toLocaleString('es-AR'):'—'}</b></div>
    <div><span class="muted">Duración:</span> <b>${c.dur?f(c.dur,1)+' hs':(maq&&maq.kgHora?'—':'cargá kg/h en la máquina')}</b></div>
  </div>`;
}

  const origen=$('o_origen').value;
  const destino=$('o_destino').value;
  const obj={
    ot:$('o_ot')?$('o_ot').value.trim():'',
    origen,
    cliente:$('o_cliente')?$('o_cliente').value.trim():'',
    oc:$('o_oc')?$('o_oc').value.trim():'',
    vendedor:$('o_vend')?$('o_vend').value.trim():'',
    maquinaId:$('o_maq').value,
    formato:$('o_formato').value,
    productoDesc:$('o_prod').value.trim(),
    cantidadObjetivo:+$('o_cant').value||null,
    unidad:$('o_unidad').value,
    densidad:+($('c_dens')?$('c_dens').value:0)||null,
    longitudBobina:+($('c_long')?$('c_long').value:0)||null,
    ancho:+($('c_ancho')?$('c_ancho').value:0)||null,
    espesor:+($('c_esp')?$('c_esp').value:0)||null,
    metrosPedidos:+($('c_metros')?$('c_metros').value:0)||null,
    k1:+($('c_k1')?$('c_k1').value:1)||1,
    pesoCono:($('c_cono')&&$('c_cono').value!=='')?+$('c_cono').value:null,
    bobinaPar:$('c_par')?$('c_par').checked:false,
    destino,
    tipoProducto:DESTINOS[destino]?.tipo,
    notas:$('o_notas').value.trim(),
    updatedAt:nowISO()
  };
  const _maqC=maqById(obj.maquinaId);
  obj.calc=calcOP({ densidad:obj.densidad, ancho:obj.ancho, espesor:obj.espesor, k1:obj.k1, longitud:obj.longitudBobina, pesoCono:obj.pesoCono, metros:obj.metrosPedidos, kgObj:obj.cantidadObjetivo, bobinaPar:obj.bobinaPar, kgHora:_maqC?_maqC.kgHora:null });
  if(id){
    const o=DATA.ordenes.find(x=>x.id===id);
    obj.estadoProduccion=$('o_estProd').value; obj.estadoDestino=$('o_estDest').value;
    Object.assign(o,obj);

  }
  closeModal(); render(); await saveData(); toast('Orden guardada');
}

    porDestino[dest]=(porDestino[dest]||0)+(+p.peso||0);
    const key=p.ordenId||'sin-orden'; if(!byOrden.has(key))byOrden.set(key,{orden:o,items:[],kg:0}); const g=byOrden.get(key); g.items.push(p); g.kg+=(+p.peso||0);

            <td>${esc((o&&o.destino)||'—')} ${tipo?`<span class="pill" style="background:${tipo==='final'?'var(--amber-l)':'var(--green-l)'};color:${tipo==='final'?'var(--amber)':'var(--green-d)'}">${tipo==='final'?'final':'proceso'}</span>`:''}</td>

const CAT_COLS={ materiasPrimas:['nombre','tipo','proveedor'], formatos:['nombre'], productos:['nombre','descripcion'] };
let _xlsxLoading=null;
function loadXLSX(){
  if(window.XLSX) return Promise.resolve();
  if(_xlsxLoading) return _xlsxLoading;
  _xlsxLoading=new Promise((res,rej)=>{ const s=document.createElement('script'); s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js'; s.onload=()=>res(); s.onerror=()=>rej(new Error('No se pudo cargar el lector de Excel')); document.head.appendChild(s); });
  return _xlsxLoading;
}
function importCat(key){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='.xlsx,.xls,.csv';
  inp.onchange=async()=>{ const file=inp.files&&inp.files[0]; if(!file)return;
    toast('Leyendo '+file.name+'…');
    try{
      await loadXLSX();
      const buf=await file.arrayBuffer();
      const wb=XLSX.read(buf,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{defval:'',raw:false});
      if(!rows.length){ toast('El archivo no tiene filas','error'); return; }
      previewImport(key,rows);
    }catch(e){ toast('Error: '+e.message,'error'); }
  };
  inp.click();
}
const _nk=k=>String(k).trim().toLowerCase();
let _pendingImport=null;
function previewImport(key,rows){
  const cols=Object.keys(rows[0]);
  const nameCol=cols.find(c=>['nombre','name','descripcion','producto','material','item'].includes(_nk(c)))||cols[0];
  const items=rows.map(r=>{ const o={nombre:String(r[nameCol]||'').trim()}; cols.forEach(c=>{ if(c!==nameCol){ const v=String(r[c]||'').trim(); if(v) o[_nk(c)]=v; } }); return o; }).filter(o=>o.nombre);
  if(!items.length){ toast('No encontré una columna con nombres','error'); return; }
  const dupes=new Set((DATA[key]||[]).map(x=>(x.nombre||'').toLowerCase()));
  const nuevos=items.filter(o=>!dupes.has(o.nombre.toLowerCase()));
  _pendingImport={key,nuevos};
  const omit=items.length-nuevos.length;
  $('modalRoot').innerHTML=`<div class="modal-bg"><div class="modal">
    <div style="display:flex;align-items:center;margin-bottom:12px"><h3 style="flex:1">Importar — ${items.length} fila${items.length>1?'s':''}</h3><button class="btn-ghost btn-sm" onclick="closeModal()">✕</button></div>
    <div class="muted" style="font-size:13px;margin-bottom:10px">Columna de nombre detectada: <b>${esc(nameCol)}</b>.${omit>0?` <span style="color:var(--amber)">${omit} ya existían y se omiten.</span>`:''}</div>
    <div style="max-height:300px;overflow:auto;border:1px solid var(--border);border-radius:8px"><table><thead><tr><th>Nombre</th><th>Otros datos</th></tr></thead><tbody>${items.slice(0,60).map(o=>{ const ex=Object.entries(o).filter(([k])=>k!=='nombre'); return `<tr><td>${esc(o.nombre)}</td><td class="muted" style="font-size:12px">${ex.map(([k,v])=>esc(k)+': '+esc(v)).join(' · ')||'—'}</td></tr>`; }).join('')}</tbody></table>${items.length>60?`<div class="muted" style="padding:8px 10px;font-size:12px">… y ${items.length-60} más</div>`:''}</div>
    <div style="display:flex;gap:10px;margin-top:14px"><div style="flex:1"></div><button class="btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn" onclick="confirmImport()" ${nuevos.length?'':'disabled style="opacity:.5"'}>Importar ${nuevos.length}</button></div>
  </div></div>`;
}
async function confirmImport(){
  if(!_pendingImport) return;
  const {key,nuevos}=_pendingImport;
  nuevos.forEach(o=>{ DATA[key].push(Object.assign({id:uid(key)},o)); });
  _pendingImport=null; closeModal(); render(); await saveData(); toast(nuevos.length+' items importados');
}
function plantillaCat(key){
  const cols=CAT_COLS[key]||['nombre'];
  const blob=new Blob([cols.join(',')+'\n'],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='plantilla-'+key+'.csv'; a.click();
}

function cfgMostrarConectar(){ $('cfgConectar').classList.toggle('hidden'); }
async function cfgCrearGist(){
  const token=$('cfgToken').value.trim(); const st=$('cfgStatus');
  if(!token.startsWith('ghp_')&&!token.startsWith('github_pat_')){ st.innerHTML='<span style="color:var(--red)">El token debe empezar con ghp_ o github_pat_</span>'; return; }
  st.textContent='Creando Gist…';
  try{ const id=await createGist(token); setGistCreds(id,token); st.innerHTML='<span style="color:var(--green-d)">Gist creado: '+esc(id)+'</span>'; await loadData(); render(); }
  catch(e){ st.innerHTML='<span style="color:var(--red)">Error: '+esc(e.message)+'</span>'; }
}
async function cfgConectarGist(){
  const token=$('cfgToken').value.trim(), id=$('cfgGistId').value.trim(); const st=$('cfgStatus');
  if(!id){ st.innerHTML='<span style="color:var(--red)">Pegá el Gist ID</span>'; return; }
  st.textContent='Conectando…';
  try{ const r=await fetch('https://api.github.com/gists/'+id,{headers:{'Authorization':'token '+token,'Accept':'application/vnd.github+json'}}); if(!r.ok)throw new Error('HTTP '+r.status); setGistCreds(id,token); await loadData(); render(); toast('Conectado'); }
  catch(e){ st.innerHTML='<span style="color:var(--red)">Error: '+esc(e.message)+'</span>'; }
}
async function addPin(){ const n=$('pinName').value.trim(), p=$('pinNum').value.trim(); if(!n||!p)return; if(DATA.config.pins[p]){ alert('Ya existe ese PIN'); return; } DATA.config.pins[p]={nombre:n,rol:$('pinRol').value}; render(); await saveData(); }
async function setPinName(pin,name){ const v=DATA.config.pins[pin]; DATA.config.pins[pin]=(typeof v==='string')?{nombre:name,rol:'admin'}:Object.assign({},v,{nombre:name}); await saveData(); }
async function setPinNum(oldp,newp){ newp=(newp||'').trim(); if(!newp||newp===oldp){ render(); return; } if(DATA.config.pins[newp]){ alert('Ya existe ese PIN'); render(); return; } const v=DATA.config.pins[oldp]; delete DATA.config.pins[oldp]; DATA.config.pins[newp]=(typeof v==='string')?{nombre:v,rol:'admin'}:v; render(); await saveData(); }
async function setPinRol(pin,r){ const v=DATA.config.pins[pin]; DATA.config.pins[pin]=(typeof v==='string')?{nombre:v,rol:r}:Object.assign({},v,{rol:r}); await saveData(); }
async function delPin(p){ delete DATA.config.pins[p]; render(); await saveData(); }
function exportJSON(){ const blob=new Blob([JSON.stringify(DATA,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='extrusion-'+new Date().toISOString().slice(0,10)+'.json'; a.click(); }

/* =========================================================
   MODO TABLET — sesiones por máquina (máx 2 simultáneas)
   ========================================================= */
function enterTablet(){ tabletSessionOrdenId=null; $('app').classList.add('hidden'); $('tablet').classList.remove('hidden'); renderTablet(); }
function exitTablet(){ $('tablet').classList.add('hidden'); $('app').classList.remove('hidden'); render(); }

function renderTablet(){
  const t=$('tablet');
  if(tabletSessionOrdenId){ return renderTabletSession(t); }
  // órdenes en producción = sesiones abiertas
  const activas=DATA.ordenes.filter(o=>o.estadoProduccion==='En producción');
  // también las que están "En cola"/"Programada" se pueden arrancar
  const arrancables=DATA.ordenes.filter(o=>o.estadoProduccion==='En cola'||o.estadoProduccion==='Programada');
  t.innerHTML=`
    <div class="tab-head">
      <div style="display:flex;align-items:center;gap:10px"><span style="background:#fff;border-radius:9px;padding:5px 9px;display:inline-flex"><img src="${LOGO_FULL}" style="height:22px;display:block"></span><span style="color:#fff;font-weight:700;font-size:16px">Tablet · Extrusión</span></div>
      <button class="btn-ghost btn-sm" onclick="exitTablet()" style="background:#1e293b;color:#fff">← Portal</button>
    </div>
    <div style="max-width:760px;margin:0 auto 14px;color:#94a3b8;font-size:14px">Tocá la máquina en la que vas a cargar. El color de cada máquina te acompaña mientras cargás para que no haya confusión.</div>
    <div class="sess-grid">
      ${activas.length?activas.map(o=>{ const m=maqById(o.maquinaId);
        return `<div class="sess-card" style="border-color:${m?.color}" onclick="openSession('${o.id}')">
          <div class="sess-band" style="background:${m?.color}"></div>
          <div class="sess-body">
            <div class="mq" style="color:${m?.color}">${esc(m?.nombre||'?')}</div>
            <div class="op">${esc(o.numero)} · ${esc(o.productoDesc||'sin descripción')}</div>
            <div class="op" style="margin-top:8px;color:#cbd5e1">${DATA.producciones.filter(p=>p.ordenId===o.id&&esHoy(p.timestamp)).length} bobinas hoy</div>
          </div>
        </div>`; }).join(''):`<div class="sess-empty">No hay máquinas corriendo.<br><span style="font-size:13px">Arrancá una orden de las que están en cola 👇</span></div>`}
    </div>
    ${arrancables.length?`<div style="max-width:760px;margin:22px auto 0">
      <div style="color:#94a3b8;font-size:13px;margin-bottom:8px;font-weight:600">EN COLA — tocá para arrancar</div>
      ${arrancables.map(o=>{ const m=maqById(o.maquinaId); return `<div class="bobina-row" style="cursor:pointer" onclick="arrancarOrden('${o.id}')"><span><span class="machine-dot" style="display:inline-block;background:${m?.color}"></span> ${esc(m?.nombre||'?')} · ${esc(o.numero)}${o.productoDesc?' · '+esc(o.productoDesc):''}</span><span style="color:#22c55e;font-weight:700">▶ Arrancar</span></div>`; }).join('')}
    </div>`:''}`;
}
async function arrancarOrden(id){ const o=DATA.ordenes.find(x=>x.id===id); o.estadoProduccion='En producción'; o.updatedAt=nowISO(); await saveData(); renderTablet(); }
function openSession(id){ tabletSessionOrdenId=id; renderTablet(); }

function renderTabletSession(t){
  const o=DATA.ordenes.find(x=>x.id===tabletSessionOrdenId); if(!o){ tabletSessionOrdenId=null; return renderTablet(); }
  const m=maqById(o.maquinaId);
  const bobinas=DATA.producciones.filter(p=>p.ordenId===o.id).sort((a,b)=>(b.timestamp||'').localeCompare(a.timestamp||''));
  const totalKg=bobinas.reduce((a,b)=>a+(+b.peso||0),0);
  t.innerHTML=`<div class="tablet-session">
    <div class="ts-band" style="background:${m?.color}">
      <div style="display:flex;align-items:center"><button class="btn-ghost btn-sm" onclick="tabletSessionOrdenId=null;renderTablet()" style="background:rgba(255,255,255,.2);color:#fff">← Máquinas</button><div style="flex:1"></div><span class="pill" style="background:rgba(255,255,255,.25);color:#fff">${esc(o.estadoProduccion)}</span></div>
      <div style="font-size:26px;font-weight:800;margin-top:12px">${esc(m?.nombre||'?')}</div>
      <div style="opacity:.9;font-size:14px">${esc(o.numero)} · ${esc(o.productoDesc||'')} · ${esc(o.formato)}</div>
    </div>
    <div class="ts-body">
      <div style="display:flex;gap:14px;margin-bottom:16px">
        <div style="flex:1;background:#0f172a;border-radius:10px;padding:12px;text-align:center"><div style="font-size:24px;font-weight:800">${bobinas.length}</div><div style="font-size:12px;color:#94a3b8">bobinas</div></div>
        <div style="flex:1;background:#0f172a;border-radius:10px;padding:12px;text-align:center"><div style="font-size:24px;font-weight:800">${totalKg.toLocaleString('es-AR')}</div><div style="font-size:12px;color:#94a3b8">kg total${o.cantidadObjetivo?` / ${o.cantidadObjetivo}`:''}</div></div>
      </div>
      <div class="field2">
        <div><label style="color:#94a3b8">Peso (kg)</label><input id="b_peso" type="number" inputmode="decimal" placeholder="0"></div>
        <div><label style="color:#94a3b8">Metros</label><input id="b_metros" type="number" inputmode="decimal" placeholder="opcional"></div>
      </div>
      <div class="field2" style="margin-top:10px">
        <div><label style="color:#94a3b8">Ancho (mm)</label><input id="b_ancho" type="number" placeholder="opcional"></div>
        <div><label style="color:#94a3b8">Operario</label><input id="b_oper" list="opers" placeholder="nombre"><datalist id="opers">${(DATA.config.operarios||[]).map(x=>`<option>${esc(x)}</option>`).join('')}</datalist></div>
      </div>
      <button class="big-btn" onclick="cargarBobina('${o.id}')">＋ Cargar bobina</button>
      <button onclick="terminarOrden('${o.id}')" style="width:100%;margin-top:10px;background:none;color:#94a3b8;padding:10px;font-weight:600">Terminar orden</button>
      ${bobinas.length?`<div style="margin-top:18px"><div style="color:#94a3b8;font-size:13px;margin-bottom:8px;font-weight:600">CARGADAS</div>${bobinas.map(b=>`<div class="bobina-row"><span>${esc(b.peso)} kg ${b.metros?`· ${esc(b.metros)} m`:''}</span><span style="color:#94a3b8">${esc(b.operario||'')} · ${fmtFecha(b.timestamp).split(' ')[1]}</span></div>`).join('')}</div>`:''}
    </div>
  </div>`;
}
async function cargarBobina(ordenId){
  const peso=+$('b_peso').value;
  if(!peso){ toast('Cargá el peso','error'); return; }
  const o=DATA.ordenes.find(x=>x.id===ordenId);
  const oper=$('b_oper').value.trim();
  if(oper&&!DATA.config.operarios.includes(oper)) DATA.config.operarios.push(oper);
  DATA.producciones.push({ id:uid('bob'), ordenId, maquinaId:o.maquinaId, formato:o.formato, peso, metros:+$('b_metros').value||null, ancho:+$('b_ancho').value||null, operario:oper, timestamp:nowISO(), updatedAt:nowISO() });
  renderTablet(); await saveData(); toast('Bobina cargada · '+peso+' kg');
}
async function terminarOrden(id){
  if(!confirm('¿Marcar la orden como terminada?')) return;
  const o=DATA.ordenes.find(x=>x.id===id); o.estadoProduccion='Terminada'; o.updatedAt=nowISO();
  tabletSessionOrdenId=null; await saveData(); renderTablet();
}

/* =========================================================
   ARRANQUE
   ========================================================= */
applyBranding();
loadData().then(()=>{ applyBranding(); });
</script>
